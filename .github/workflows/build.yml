name: Build & Validate
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        run: npm run build

      - name: Verify dist
        run: |
          if [ ! -d "dist" ]; then echo "❌ dist directory missing"; exit 1; fi
          if [ ! -f "dist/font/icons.css" ]; then echo "❌ icons.css missing"; exit 1; fi
          echo "✅ Build verified"
